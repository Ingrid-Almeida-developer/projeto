<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Cadastro de empresas</title>
		<link rel="stylesheet" href="style/style.css">
        <link rel="icon" href="imagens/arduino.png" type="favicon">
	</head>
	<body>
		<header>
			<h1>Cadastro de empresas</h1>		      </header>
		<main>
			<h2>Preencha seus dados</h2>
		   	 <form method="POST">
               		 	<fieldset>
                   	 		<legend>Qual o nome da empresa ?</legend>
                   	 		<label for="nome">Nome da Empresa:</label>
                    			<input type="text" id="nome" name="nome" required>
               			 </fieldset>
               			 <fieldset>
                   			 <legend>Informe o email da empresa</legend>
                   	 		 <label for="email">Email:</label>
                   	 		 <input type="email" id="email" name="email" required>
               			 </fieldset>
                		 <fieldset>
                   	 		<legend>Qual a localização da empresa ?</legend>
                   	 		<label for="localizacao">Localização:</label>
                   		        <input type="text" id="localizacao" name="localizacao" required>
              	  		 </fieldset>
				 <button type="submit">Enviar</button>
               		 </form>
		</main>
	</body>
</html>
