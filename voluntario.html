<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Cadastro de voluntários</title>
		<link rel="stylesheet" href="style/style.css">
        <link rel="icon" href="imagens/arduino.png" type="favicon">
	</head>
	<body>
       		<header>
			<h1>Cadastro de voluntários</h1>		
		</header>
		<main>
	       		 <h2>Preencha seus dados</h2>
		 	 <form method="POST">
        	 	 	<fieldset>
                   			 <legend>Qual o seu nome ?</legend>
                   			 <label for="nome">Nome Completo:</label>
                   			 <input type="text" id="nome" name="nome" required>
               			 </fieldset>
               			 <fieldset>
                   			 <legend>Informe o seu email</legend>
                   			 <label for="email">Email:</label>
                   	 		<input type="email" id="email" name="email" required>
               			 </fieldset>
               			 <fieldset>
                   			 <legend>Qual é o seu nível de experiência ?</legend>
                   			 <label for="iniciante">Iniciante</label>
                   			 <input type="radio" id="iniciante" name="nivel" value="iniciante">
                   			 <label for="intermediario">Intermediário</label>
                   			 <input type="radio" id="intermediario" name="nivel" value="intermediario">
                   			 <label for="avancado">Avançado</label>
                   			 <input type="radio" id="avancado" name="nivel" value="avancado">
              		 	 </fieldset>
	                 	 <button type="submit">Enviar</button>
			</form>
		</main>
	</body>
</html>
